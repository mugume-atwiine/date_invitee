<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- STEP 1 -->
  <div class="screen active" id="step1">
    <h1 id="titleText"></h1>
    <p>This is important… choose wisely 😌</p>
    <button class="primary" onclick="startExperience()">Yes ❤️</button>
    <button id="noBtn">No</button>
  </div>

  <!-- STEP 2 -->
  <div class="screen" id="step2">
    <h1>Pick a day</h1>
    <button onclick="selectDay('Saturday')">Saturday</button>
    <button onclick="selectDay('Sunday')">Sunday</button>
  </div>

  <!-- STEP 3 -->
  <div class="screen" id="step3">
    <h1 id="dayTitle"></h1>
    <div id="options"></div>
    <button class="secondary" onclick="goBack(2)">← Change day</button>
  </div>

  <!-- STEP 4 -->
  <div class="screen" id="step4">
    <h1>Pick a time</h1>
    <button onclick="finish('Morning ☀️')">Morning</button>
    <button onclick="finish('Afternoon 🌤️')">Afternoon</button>
    <button onclick="finish('Evening 🌙')">Evening</button>
  </div>

  <!-- FINAL -->
  <div class="screen" id="final">
    <h1>It’s a date ❤️</h1>
    <p id="result"></p>
    <p>I love you. I can’t wait to spend this time with you 💕</p>
    <p>See you soon, Isabel 😘</p>

    <div id="catGif" class="hidden">
      <div class="tenor-gif-embed"
        data-postid="9168835756461277783"
        data-share-method="host"
        data-width="100%">
      </div>
    </div>
  </div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="audio/romantic.mp3">
</audio>

<audio id="clickSound">
  <source src="audio/click.mp3">
</audio>

<script>
// ===== NAMES =====
const yourName = "Atwiine";
const herName = "Isabel";

document.getElementById("titleText").innerText =
`${herName}, will you go on a date with ${yourName}? ❤️`;

// ===== SOUND =====
function playClick() {
  const click = document.getElementById("clickSound");
  click.currentTime = 0;
  click.play().catch(()=>{});
}

document.addEventListener("click", (e)=>{
  if(e.target.tagName === "BUTTON") playClick();
});

// ===== MUSIC FADE =====
function startExperience(){
  const music = document.getElementById("bgMusic");

  music.volume = 0;
  music.play().catch(()=>{});

  let v = 0;
  let fade = setInterval(()=>{
    if(v < 0.5){
      v += 0.05;
      music.volume = v;
    } else clearInterval(fade);
  },200);

  showStep(2);
}

// ===== NAVIGATION =====
let selectedDay = "";
let selectedPlace = "";

function showStep(step){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });

  setTimeout(()=>{
    document.getElementById("step"+step)?.classList.add("active");
    if(step === "final") document.getElementById("final").classList.add("active");
  },200);
}

function goBack(step){
  showStep(step);
}

function selectDay(day){
  selectedDay = day;
  document.getElementById("dayTitle").innerText = day + " options";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  if(day==="Saturday"){
    addOption("Jahazi Pier – Munyonyo");
    addOption("Usawa Cafe – Naguru");
  } else {
    addOption("Paint & Chicken – Chop House Gardens");
    addOption("Le Botti Clubbing");
  }

  showStep(3);
}

function addOption(name){
  const btn = document.createElement("button");
  btn.innerText = name;
  btn.onclick = ()=>{
    selectedPlace = name;
    showStep(4);
  };
  document.getElementById("options").appendChild(btn);
}

function finish(time){
  document.getElementById("result").innerText =
  `${selectedDay} • ${selectedPlace} • ${time}`;

  showStep("final");

  setTimeout(()=>{
    document.getElementById("catGif").classList.remove("hidden");
  },800);
}

// ===== FLOATING NO =====
const noBtn = document.getElementById("noBtn");
noBtn.onmouseover = ()=>{
  noBtn.style.position="absolute";
  noBtn.style.top=Math.random()*80+"%";
  noBtn.style.left=Math.random()*80+"%";
};
</script>

<script async src="https://tenor.com/embed.js"></script>

</body>
</html>
